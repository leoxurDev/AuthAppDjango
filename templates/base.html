<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Basic Django Auth</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #0f172a; color: #e5eefb; }
      .page { max-width: 980px; margin: 0 auto; padding: 40px 20px; }
      .card { background: #111827; padding: 24px; border-radius: 14px; box-shadow: 0 18px 36px rgba(15, 23, 42, 0.35); }
      a { color: #93c5fd; text-decoration: none; }
      .grid { display: grid; gap: 16px; }
      .pill { display: inline-block; background: #1d4ed8; color: #fff; padding: 10px 14px; border-radius: 999px; }
      .muted { color: #cbd5e1; }
      code { background: #1f2937; padding: 2px 6px; border-radius: 6px; }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card">
        {% block content %}{% endblock %}
      </section>
    </main>
  </body>
</html>
