{% extends 'base.html' %}

{% block content %}
  <h1>Welcome to Django Authentication</h1>

  {% if user.is_authenticated %}
    <p>Welcome back, <strong>{{ user.username }}</strong>!</p>
    <p><a class="pill" href="{% url 'logout' %}">Log out</a></p>
  {% else %}
    <div class="grid">
      <p><a class="pill" href="{% url 'login' %}">Sign in</a></p>
      <p><a href="{% url 'signup' %}">Create a new account</a></p>
    </div>
  {% endif %}
{% endblock %}
