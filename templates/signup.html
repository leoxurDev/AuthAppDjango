{% extends "base.html" %}

{% block content %}
<h1>Sign Up</h1>
{% if error %}
<div style="color: #ef4444; margin-bottom: 16px;">{{ error }}</div>
{% endif %}
<form method="post" style="display: grid; gap: 12px;">
  {% csrf_token %}
  <div>
    <label for="username">Username</label>
    <input type="text" id="username" name="username" required style="width: 100%; padding: 8px; border: 1px solid #334155; border-radius: 6px; background: #1f2937; color: #e5eefb;">
  </div>
  <div>
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required style="width: 100%; padding: 8px; border: 1px solid #334155; border-radius: 6px; background: #1f2937; color: #e5eefb;">
  </div>
  <div>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" required style="width: 100%; padding: 8px; border: 1px solid #334155; border-radius: 6px; background: #1f2937; color: #e5eefb;">
  </div>
  <div>
    <label for="password2">Confirm Password</label>
    <input type="password" id="password2" name="password2" required style="width: 100%; padding: 8px; border: 1px solid #334155; border-radius: 6px; background: #1f2937; color: #e5eefb;">
  </div>
  <button type="submit" style="padding: 10px 16px; background: #1d4ed8; color: #fff; border: none; border-radius: 6px; cursor: pointer;">Sign Up</button>
</form>
<p style="margin-top: 16px;">Already have an account? <a href="{% url 'login' %}">Login</a></p>
{% endblock %}
