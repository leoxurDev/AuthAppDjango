{% extends "base.html" %}

{% block title %}Sign In - CraftProfile{% endblock %}

{% block content %}
<style>
  .auth-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    flex: 1;
    padding: 40px 0;
  }

  .auth-card {
    max-width: 420px;
    width: 100%;
    background-color: var(--surface);
    border: 1px solid var(--border-color);
    border-radius: var(--border-radius-md);
    box-shadow: var(--shadow-3);
    padding: 40px 32px;
  }

  .auth-header {
    text-align: center;
    margin-bottom: 32px;
  }

  .auth-title {
    font-size: 1.8rem;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }

  .auth-subtitle {
    color: var(--on-surface-muted);
    font-size: 0.9rem;
  }

  .form-group {
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .form-label {
    font-size: 0.85rem;
    font-weight: 600;
    color: #ffffff;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .form-input {
    width: 100%;
    padding: 12px 16px;
    background-color: rgba(255, 255, 255, 0.03);
    border: 1px solid var(--border-color);
    border-radius: var(--border-radius-sm);
    color: #ffffff;
    font-size: 0.95rem;
    transition: all var(--transition-speed);
    outline: none;
  }

  .form-input:focus {
    border-color: var(--primary-color);
    background-color: rgba(255, 255, 255, 0.05);
    box-shadow: 0 0 0 3px rgba(98, 0, 238, 0.2);
  }

  .auth-error {
    background-color: rgba(207, 102, 121, 0.15);
    color: var(--error);
    border: 1px solid rgba(207, 102, 121, 0.25);
    padding: 12px 16px;
    border-radius: var(--border-radius-sm);
    font-size: 0.85rem;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .auth-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 0.9rem;
    color: var(--on-surface-muted);
  }

  .auth-footer a {
    color: var(--secondary-color);
    text-decoration: none;
    font-weight: 600;
  }

  .auth-footer a:hover {
    text-decoration: underline;
  }
</style>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <span class="material-icons" style="font-size: 44px; color: var(--secondary-color); margin-bottom: 8px;">lock_open</span>
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Sign in to edit your custom profile</p>
    </div>

    {% if error %}
      <div class="auth-error">
        <span class="material-icons" style="font-size: 18px;">error_outline</span>
        <span>{{ error }}</span>
      </div>
    {% endif %}

    <form method="post" action="{% url 'login' %}">
      {% csrf_token %}
      
      <div class="form-group">
        <label for="username" class="form-label">
          <span class="material-icons" style="font-size: 16px; color: var(--on-surface-muted);">person</span>
          Username
        </label>
        <input type="text" id="username" name="username" required autocomplete="username" class="form-input" placeholder="Enter your username">
      </div>

      <div class="form-group" style="margin-bottom: 28px;">
        <label for="password" class="form-label">
          <span class="material-icons" style="font-size: 16px; color: var(--on-surface-muted);">vpn_key</span>
          Password
        </label>
        <input type="password" id="password" name="password" required autocomplete="current-password" class="form-input" placeholder="Enter your password">
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;">
        <span class="material-icons">login</span>Sign In
      </button>
    </form>

    <div class="auth-footer">
      <p>Don't have an account? <a href="{% url 'signup' %}">Register Now</a></p>
    </div>
  </div>
</div>
{% endblock %}
